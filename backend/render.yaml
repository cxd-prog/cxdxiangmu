services:
  - type: web
    name: ai-music-generator-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: MINIMAX_API_KEY
        sync: false
      - key: TONGYI_API_KEY
        sync: false
      - key: QIANFAN_API_KEY
        sync: false
