services:
  - type: web
    name: ai-music-generator
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: MINIMAX_API_KEY
        sync: false
      - key: TONGYI_API_KEY
        sync: false
      - key: QIANFAN_API_KEY
        sync: false
